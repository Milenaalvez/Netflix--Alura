<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Netflix - Início</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- ================= TOPO ================= -->
 
<header class="topo">

    <h1>NETFLIX</h1>

    <nav class="menu-topo">
        <span onclick="carregarInicio()">Início</span>
        <span onclick="carregarCategoria('popular')">Populares</span>
        <span onclick="carregarCategoria('top_rated')">Mais avaliados</span>
        <span onclick="carregarCategoria('upcoming')">Em breve</span>
    </nav>

    <div class="acoes">

        <span class="pesquisa-texto" id="abrirBusca">🔍</span>
        <input type="text" id="pesquisa" class="hidden" placeholder="Buscar...">

        <button id="toggleTema">🌙</button>

        <!-- 👇 PERFIL AQUI (CORRETO) -->
        <div class="perfil-topo">
            <img id="perfilImg">
            <span id="perfilNome"></span>
        </div>

    </div>

</header>

<!-- ================= USUÁRIO ================= -->
<section class="usuario-area">
</section>
<!-- ================= banner  ================= -->
<section id="banner">
    <div class="banner-conteudo">
        <h1 id="banner-titulo">Carregando...</h1>
        <p id="banner-desc"></p>

        <div class="banner-botoes">
            <button class="btn-play">▶ Assistir</button>
            <button class="btn-info">ℹ Mais info</button>
        </div>
    </div>
</section>

<!-- ================= CONTEÚDO ================= -->
<main>
    <div id="linhas">
        <!-- JS vai inserir os carrosséis aqui -->
    </div>
</main>

<!-- ================= MODAL (DETALHES DO FILME) ================= -->
<div class="modal" id="modal">
  <div class="modal-content">

    <span id="fechar">&times;</span>

    <img id="modal-img" src="">

    <div class="modal-info">
        <h2 id="modal-titulo"></h2>
        <p id="modal-desc"></p>

        <div class="modal-botoes">
            <button class="btn-play-modal">▶ Assistir</button>
            <button class="btn-fav">+ Favoritar</button>
        </div>
    </div>

    <div id="trailer-container" style="display:none;">
      <iframe id="trailer-video" width="100%" height="400" frameborder="0"></iframe>
    </div>


  </div>
</div>

<!-- ================= SCRIPT ================= -->
<script src="home.js"></script>

</body>
</html>
